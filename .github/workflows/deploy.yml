name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Install git & docker if not installed
            sudo yum install git -y
            sudo amazon-linux-extras install docker -y || true
            sudo systemctl start docker
            sudo usermod -aG docker ec2-user

            # Remove old project
            rm -rf chess-devops

            # Clone correct repo
            git clone https://github.com/BK-KRISH/chess-devops.git

            # Go to app folder
            cd chess-devops/app

            # Stop old container
            docker stop bk-app || true
            docker rm bk-app || true

            # Build new image
            docker build -t bk-app .

            # Run container
            docker run -d -p 80:80 bk-app